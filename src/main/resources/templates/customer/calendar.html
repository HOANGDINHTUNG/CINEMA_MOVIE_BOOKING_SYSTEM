<!DOCTYPE html>

<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">

<head>

    <th:block th:replace="~{fragments/customer/head :: head(#{calendar.page_title})}"></th:block>

    <link rel="stylesheet" th:href="@{/css/customer/calendar.css}"/>

    <link rel="stylesheet" th:href="@{/css/customer/movie-cards.css}"/>

</head>

<body class="customer-site schedule-page schedule-page--async"
      th:attr="data-app-lang=${appLang},
               data-selected-date=${#temporals.format(selectedDate, 'yyyy-MM-dd')},
               data-country-labels=${countryLabelsJson},
               data-msg-loading=#{calendar.loading},
               data-msg-load-error=#{calendar.load_error},
               data-msg-results-count-tpl=#{calendar.results_count_tpl},
               data-msg-results-date-tpl=#{calendar.results_date_tpl},
               data-msg-empty-filtered=#{calendar.empty_filtered},
               data-msg-empty-day=#{calendar.empty_day},
               data-msg-view-detail=#{calendar.view_detail},
               data-msg-showtime-list=#{calendar.showtime_list},
               data-msg-origin=#{movie.origin},
               data-msg-release=#{movie.release_date},
               data-msg-minutes=#{common.minutes},
               data-msg-book-seats-tpl=#{calendar.book_seats_tpl},
               data-msg-sold-out=#{showtime.sold_out},
               data-msg-filter-available=#{calendar.filter_available_short},
               data-msg-search-all=#{calendar.search_all}">

<div th:replace="~{fragments/customer/loader :: loader}"></div>

<div th:replace="~{fragments/customer/header :: header}"></div>



<main class="schedule-main">

    <section class="title-bar">

        <h2 class="schedule-page-title">

            <span class="schedule-page-title__dot" aria-hidden="true"></span>

            <span th:text="#{calendar.now_showing}">Phim đang chiếu</span>

        </h2>



        <div class="schedule-layout">

            <div class="schedule-sidebar-backdrop" id="scheduleSidebarBackdrop" hidden></div>



            <aside class="schedule-sidebar" id="scheduleSidebar" th:attr="aria-label=#{calendar.sidebar_aria}">

                <div class="schedule-sidebar__head">

                    <h3 class="schedule-sidebar__title" th:text="#{calendar.filters_title}">Bộ lọc</h3>

                    <a th:href="@{/customer/calendar(date=${#temporals.format(selectedDate, 'yyyy-MM-dd')})}"

                       class="schedule-sidebar__reset" th:text="#{calendar.reset_filters}">Đặt lại</a>

                </div>



                <form class="schedule-sidebar__form" method="get" th:action="@{/customer/calendar}" id="scheduleFilterForm">

                    <input type="hidden" name="sort" th:value="${selectedSort}"/>
                    <input type="hidden" name="view" th:value="${viewMode}"/>

                    <div class="schedule-sidebar__group schedule-sidebar__group--origin">
                        <label class="schedule-sidebar__label" for="searchOrigin" th:text="#{calendar.filter_origin}">Xuất xứ</label>
                        <select id="searchOrigin" name="origin" class="schedule-sidebar__select schedule-sidebar__select--origin">
                            <option value="" th:text="#{calendar.filter_origin_all}">Tất cả quốc gia</option>
                            <option th:each="opt : ${originFilterOptions}"
                                    th:value="${opt}"
                                    th:text="${T(com.re.cinemamoviebookingsystem.util.CountryNames).label(opt, #locale)}"
                                    th:selected="${selectedOrigins != null and selectedOrigins.contains(opt)}"></option>
                        </select>
                    </div>

                    <div class="schedule-sidebar__group">

                        <label class="schedule-sidebar__label" for="searchQ" th:text="#{calendar.search_movie_label}">Tên phim</label>

                        <input type="search" id="searchQ" name="q" class="schedule-sidebar__input"

                               th:value="${searchQuery}" th:placeholder="#{calendar.search_placeholder}" autocomplete="off"/>

                    </div>



                    <div class="schedule-sidebar__group">

                        <label class="schedule-sidebar__label" for="searchGenre" th:text="#{calendar.search_genre_label}">Thể loại</label>

                        <select id="searchGenre" name="genre" class="schedule-sidebar__select">

                            <option value="" th:text="#{calendar.search_all}" th:selected="${selectedGenre == null or selectedGenre == ''}">Tất cả</option>

                        </select>

                    </div>



                    <div class="schedule-sidebar__group">

                        <label class="schedule-sidebar__label" for="searchDate" th:text="#{calendar.search_date_label}">Ngày chiếu</label>

                        <input type="date" id="searchDate" name="date" class="schedule-sidebar__input schedule-sidebar__input--date"

                               th:value="${#temporals.format(selectedDate, 'yyyy-MM-dd')}"/>

                    </div>



                    <fieldset class="schedule-sidebar__fieldset">

                        <legend class="schedule-sidebar__label" th:text="#{calendar.filter_age}">Độ tuổi</legend>

                        <ul class="schedule-sidebar__checks">

                            <li th:each="opt : ${ageFilterOptions}">

                                <label class="schedule-sidebar__check">

                                    <input type="checkbox" name="age" th:value="${opt}"

                                           th:checked="${selectedAges.contains(opt)}"/>

                                    <span th:text="${opt}">T16</span>

                                </label>

                            </li>

                        </ul>

                    </fieldset>



                    <fieldset class="schedule-sidebar__fieldset">

                        <legend class="schedule-sidebar__label" th:text="#{calendar.filter_format}">Định dạng</legend>

                        <ul class="schedule-sidebar__checks schedule-sidebar__checks--inline">

                            <li th:each="opt : ${formatFilterOptions}">

                                <label class="schedule-sidebar__check">

                                    <input type="checkbox" name="format" th:value="${opt}"

                                           th:checked="${selectedFormats.contains(opt)}"/>

                                    <span th:text="${opt}">2D</span>

                                </label>

                            </li>

                        </ul>

                    </fieldset>



                    <div class="schedule-sidebar__group schedule-sidebar__group--toggle">

                        <label class="schedule-sidebar__toggle">

                            <input type="checkbox" name="available" value="true" th:checked="${availableOnly}"/>

                            <span class="schedule-sidebar__toggle-ui" aria-hidden="true"></span>

                            <span th:text="#{calendar.filter_available}">Chỉ suất còn vé</span>

                        </label>

                    </div>



                    <button type="submit" class="schedule-sidebar__submit">

                        <i class="fas fa-search" aria-hidden="true"></i>

                        <span th:text="#{calendar.filter_apply}">Áp dụng bộ lọc</span>

                    </button>

                </form>

            </aside>



            <div class="schedule-content">

                <button type="button" class="schedule-filters-toggle" id="scheduleFiltersToggle" aria-expanded="false"

                        aria-controls="scheduleSidebar">

                    <i class="fas fa-sliders-h" aria-hidden="true"></i>

                    <span th:text="#{calendar.filters_title}">Bộ lọc</span>

                </button>



                <div class="schedule-summary-bar" id="scheduleSummaryBar" hidden>

                    <span class="schedule-summary-bar__label" th:text="#{calendar.active_filters}">Đang lọc</span>

                    <span id="scheduleSummaryChips"></span>

                </div>



                <nav class="date-buttons" id="scheduleDayTabs" th:attr="aria-label=#{calendar.date_nav_aria}">

                    <span class="date-btn date-btn--skeleton" aria-hidden="true"></span>

                    <span class="date-btn date-btn--skeleton" aria-hidden="true"></span>

                    <span class="date-btn date-btn--skeleton" aria-hidden="true"></span>

                    <span class="date-btn date-btn--skeleton" aria-hidden="true"></span>

                    <span class="date-btn date-btn--skeleton" aria-hidden="true"></span>

                </nav>



                <div class="schedule-results-bar">

                    <p class="schedule-results-bar__summary" id="scheduleResultsSummary">

                        <span class="schedule-results-bar__count" th:text="#{calendar.loading}">Đang tải lịch chiếu…</span>

                        <span class="schedule-results-bar__date" id="scheduleResultsDate"></span>

                    </p>

                    <div class="schedule-results-bar__controls">

                        <form class="schedule-sort-form" method="get" th:action="@{/customer/calendar}" id="scheduleSortForm">

                            <input type="hidden" name="date" th:value="${#temporals.format(selectedDate, 'yyyy-MM-dd')}"/>

                            <input type="hidden" name="q" th:value="${searchQuery}"/>

                            <input type="hidden" name="genre" th:value="${selectedGenre}"/>

                            <input type="hidden" name="view" th:value="${viewMode}"/>

                            <th:block th:each="a : ${selectedAges}">

                                <input type="hidden" name="age" th:value="${a}"/>

                            </th:block>

                            <th:block th:each="f : ${selectedFormats}">

                                <input type="hidden" name="format" th:value="${f}"/>

                            </th:block>

                            <th:block th:each="o : ${selectedOrigins}">

                                <input type="hidden" name="origin" th:value="${o}"/>

                            </th:block>

                            <input type="hidden" name="available" value="true" th:if="${availableOnly}"/>

                            <label class="schedule-sort-form__label" for="scheduleSort" th:text="#{calendar.sort_label}">Sắp xếp theo</label>

                            <select id="scheduleSort" name="sort" class="schedule-sort-form__select">

                                <option value="name" th:selected="${selectedSort == 'name'}" th:text="#{calendar.sort_name}">Tên A-Z</option>

                                <option value="time" th:selected="${selectedSort == 'time'}" th:text="#{calendar.sort_time}">Suất sớm nhất</option>

                            </select>

                        </form>

                        <div class="schedule-view-toggle" id="scheduleViewToggle" th:attr="aria-label=#{calendar.view_mode_aria}">

                            <button type="button" class="schedule-view-toggle__btn"

                               th:classappend="${viewMode == 'grid'} ? ' is-active' : ''"

                               data-schedule-view="grid"

                               th:attr="title=#{calendar.view_grid}">

                                <i class="fas fa-th" aria-hidden="true"></i>

                            </button>

                            <button type="button" class="schedule-view-toggle__btn"

                               th:classappend="${viewMode == 'list'} ? ' is-active' : ''"

                               data-schedule-view="list"

                               th:attr="title=#{calendar.view_list}">

                                <i class="fas fa-bars" aria-hidden="true"></i>

                            </button>

                        </div>

                    </div>

                </div>



                <section class="movies movies--grid" id="scheduleMoviesRoot" aria-busy="true">

                    <article class="movie-card movie-card--skeleton" aria-hidden="true"><span class="poster-frame"></span><span class="info"></span></article>

                    <article class="movie-card movie-card--skeleton" aria-hidden="true"><span class="poster-frame"></span><span class="info"></span></article>

                    <article class="movie-card movie-card--skeleton" aria-hidden="true"><span class="poster-frame"></span><span class="info"></span></article>

                </section>



                <p class="note" th:text="#{calendar.age_note}">

                    Lưu ý: Khán giả dưới 13 tuổi chỉ chọn suất chiếu kết thúc trước 22h và

                    Khán giả dưới 16 tuổi chỉ chọn suất chiếu kết thúc trước 23h.

                </p>

            </div>

        </div>

    </section>

</main>



<div th:replace="~{fragments/customer/footer :: footer}"></div>

<th:block th:replace="~{fragments/customer/scripts :: scripts}"></th:block>

<script th:src="@{/js/customer/calendar-filters.js}" defer></script>
<script th:src="@{/js/customer/calendar-page.js}" defer></script>

</body>

</html>
