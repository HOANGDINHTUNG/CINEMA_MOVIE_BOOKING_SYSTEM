<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/customer/head :: head('Khuyến mãi')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/customer/news.css}"/>
</head>
<body class="customer-site">
<div th:replace="~{fragments/customer/loader :: loader}"></div>
<div th:replace="~{fragments/customer/header :: header}"></div>

<div class="ncc-content-page customer-page">
    <p class="title">Khuyến mãi</p>
    <div class="grid" th:if="${!#lists.isEmpty(articles)}">
        <a th:each="a : ${articles}" th:href="@{/customer/promotions/{id}(id=${a.id})}" class="card card--image-only">
            <img th:src="${a.thumbnailUrl != null} ? @{${a.thumbnailUrl}} : @{/assets/img/poster.jpg}" alt=""/>
        </a>
    </div>
    <p th:if="${#lists.isEmpty(articles)}" style="color:#ccc;">Chưa có khuyến mãi.</p>
</div>

<div th:replace="~{fragments/customer/footer :: footer}"></div>
<th:block th:replace="~{fragments/customer/scripts :: scripts}"></th:block>
</body>
</html>
