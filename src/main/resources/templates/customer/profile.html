<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/customer/head :: head('Hồ sơ')}"></th:block>
</head>
<body class="customer-site">
<div th:replace="~{fragments/customer/loader :: loader}"></div>
<div th:replace="~{fragments/customer/header :: header}"></div>
<div class="customer-page">
    <h1 class="section-title">Hồ sơ cá nhân</h1>
    <p th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></p>
    <div class="profile-card">
        <p class="profile-meta">Tên đăng nhập: <strong th:text="${profile.username}"></strong></p>
        <p class="profile-meta mb-4">Email: <strong th:text="${profile.email}"></strong></p>
        <form th:action="@{/customer/profile}" th:object="${profileUpdate}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label class="info-label d-block mb-1">Họ tên</label>
            <input class="form-control mb-3" th:field="*{fullName}" required/>
            <label class="info-label d-block mb-1">Số điện thoại</label>
            <input class="form-control mb-4" th:field="*{phoneNumber}"/>
            <button type="submit" class="btn btn-danger">Lưu thay đổi</button>
        </form>
        <p class="mt-4 mb-0" style="font-size:13px;color:#94a3b8;">
            <button type="button" class="btn btn-sm btn-outline-light" id="btnResetGuide">Xem lại hướng dẫn đặt vé</button>
        </p>
    </div>
</div>
<div th:replace="~{fragments/customer/footer :: footer}"></div>
<th:block th:replace="~{fragments/customer/scripts :: scripts}"></th:block>
</body>
</html>
