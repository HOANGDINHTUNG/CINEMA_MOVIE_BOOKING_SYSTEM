<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/customer/head :: head(#{bookings.page_title})}"></th:block>
    <link rel="stylesheet" th:href="@{/css/customer/account.css}"/>
</head>
<body class="customer-site account-page">
<div th:replace="~{fragments/customer/loader :: loader}"></div>
<div th:replace="~{fragments/customer/header :: header}"></div>
<div class="account-layout">
    <div th:replace="~{fragments/customer/account-sidebar :: sidebar}"></div>
    <main class="account-content">
        <h1 class="account-content__title" th:text="#{bookings.history_title}">Lịch sử đặt vé</h1>
        <div th:replace="~{fragments/customer/alerts :: alerts}"></div>

        <div class="booking-filter-tabs" role="tablist">
            <a th:href="@{/customer/bookings}" class="booking-filter-tab"
               th:classappend="${statusFilter == 'ALL'} ? ' active' : ''" th:text="#{bookings.filter.all}">Tất cả</a>
            <a th:href="@{/customer/bookings(status='PAID')}" class="booking-filter-tab"
               th:classappend="${statusFilter == 'PAID'} ? ' active' : ''" th:text="#{booking.status.paid}">Đã thanh toán</a>
            <a th:href="@{/customer/bookings(status='PENDING')}" class="booking-filter-tab"
               th:classappend="${statusFilter == 'PENDING'} ? ' active' : ''" th:text="#{booking.status.pending}">Chờ thanh toán</a>
            <a th:href="@{/customer/bookings(status='HELD')}" class="booking-filter-tab"
               th:classappend="${statusFilter == 'HELD'} ? ' active' : ''" th:text="#{booking.status.checkout_in_progress}">Đang thanh toán</a>
            <a th:href="@{/customer/bookings(status='CANCELLED')}" class="booking-filter-tab"
               th:classappend="${statusFilter == 'CANCELLED'} ? ' active' : ''" th:text="#{booking.status.cancelled}">Đã hủy</a>
        </div>

        <div class="booking-cards" th:if="${!#lists.isEmpty(bookings)}">
            <article class="booking-card" th:each="b : ${bookings}">
                <div class="booking-card__head">
                    <span class="booking-card__id" th:text="#{bookings.col.id} + ' #' + ${b.bookingId}">#1</span>
                    <span th:switch="${b.status.name()}">
                        <span th:case="'HELD'" class="status-badge status-held" th:text="#{booking.status.checkout_in_progress}">Đang thanh toán</span>
                        <span th:case="'PAID'" class="status-badge status-paid" th:text="#{booking.status.paid}">Đã thanh toán</span>
                        <span th:case="'PENDING'" class="status-badge status-pending" th:text="#{booking.status.pending}">Chờ thanh toán</span>
                        <span th:case="'CANCELLED'" class="status-badge status-cancelled" th:text="#{booking.status.cancelled}">Đã hủy</span>
                        <span th:case="*" class="status-badge" th:text="${b.status}"></span>
                    </span>
                </div>
                <h3 class="booking-card__title" th:text="${b.movieTitle}">Phim</h3>
                <ul class="booking-card__meta">
                    <li>
                        <span th:text="#{bookings.col.showtime}">Suất</span>:
                        <strong th:text="${#temporals.format(b.showtimeStart, 'dd/MM/yyyy HH:mm')}"></strong>
                    </li>
                    <li>
                        <span th:text="#{bookings.col.seats}">Ghế</span>:
                        <strong th:text="${#strings.listJoin(b.seatLabels, ', ')}"></strong>
                    </li>
                    <li>
                        <span th:text="#{bookings.col.total}">Tổng</span>:
                        <strong th:text="${#numbers.formatDecimal(b.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></strong>
                    </li>
                </ul>
                <span th:if="${b.status.name() == 'HELD' and b.heldActive and b.lockExpiresAt != null}" class="held-expires-hint">
                    <span th:text="#{bookings.held_expires_prefix}">Hết hạn giữ ghế:</span>
                    <strong th:text="${#temporals.format(b.lockExpiresAt, 'HH:mm')}">--:--</strong>
                </span>
                <div class="booking-card__actions">
                    <a th:if="${b.status.name() == 'HELD' and b.heldActive}"
                       th:href="@{/customer/showtimes/{id}/seats(id=${b.showtimeId})}"
                       class="btn btn-sm btn-held-resume" th:text="#{bookings.resume}">Tiếp tục đặt vé</a>
                    <a th:if="${b.status.name() != 'HELD' or !b.heldActive}"
                       th:href="@{/customer/bookings/{id}(id=${b.bookingId})}" class="btn btn-sm btn-outline-light" th:text="#{bookings.detail}">Chi tiết</a>
                    <form th:if="${b.cancellable}" th:action="@{/customer/bookings/{id}/cancel(id=${b.bookingId})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-danger" th:text="#{booking.cancel}">Hủy vé</button>
                    </form>
                </div>
            </article>
        </div>

        <div class="empty-state-card account-empty" th:if="${#lists.isEmpty(bookings)}">
            <p th:text="#{bookings.empty}"></p>
            <a th:href="@{/customer/home}" class="btn btn-danger me-2" th:text="#{booking.browse_movies}">Xem phim</a>
            <a th:href="@{/customer/calendar}" class="btn btn-outline-light" th:text="#{nav.calendar}">Lịch chiếu</a>
        </div>
    </main>
</div>
<div th:replace="~{fragments/customer/footer :: footer}"></div>
<th:block th:replace="~{fragments/customer/scripts :: scripts}"></th:block>
</body>
</html>
