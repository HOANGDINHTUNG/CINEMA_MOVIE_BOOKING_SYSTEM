<div th:fragment="homePromoModal" th:if="${homePromoImage}" id="homePromoModal" class="home-promo-overlay" role="dialog"
     aria-modal="true" th:attr="aria-label=#{home.promo.dialog_label}" hidden xmlns:th="http://www.thymeleaf.org">
    <div class="home-promo-modal">
        <button type="button" class="home-promo-close" id="homePromoCloseBtn"
                th:attr="aria-label=#{home.promo.close}">&times;</button>
        <a th:href="@{${homePromoLink}}" class="home-promo-card">
            <img th:src="${homePromoImage}" alt="" class="home-promo-card__img" decoding="async"/>
        </a>
    </div>
</div>
