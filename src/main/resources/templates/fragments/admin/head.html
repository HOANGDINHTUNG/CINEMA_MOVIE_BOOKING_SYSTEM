<th:block th:fragment="head(title)" xmlns:th="http://www.thymeleaf.org">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' - Admin NCC'">Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin/admin-movies.css}"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#d32f2f',
                        secondary: '#f44336',
                        dark: '#1a1a1a',
                        light: '#f5f5f5'
                    }
                }
            }
        };
    </script>
</th:block>
