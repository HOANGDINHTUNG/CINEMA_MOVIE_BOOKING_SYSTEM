<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/admin/head :: head('Hồ sơ admin')}"></th:block>
</head>
<body class="bg-gray-100">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/admin/sidebar :: sidebar('profile')}"></div>
    <div class="ml-64 flex-1">
        <div class="bg-white shadow-sm p-4">
            <h1 class="text-xl font-semibold text-gray-800">Hồ sơ quản trị</h1>
        </div>
        <div class="p-6 max-w-lg">
            <form th:action="@{/admin/profile}" th:object="${profileUpdate}" method="post"
                  class="bg-white rounded-lg shadow p-6 space-y-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Họ tên</label>
                    <input th:field="*{fullName}" required class="w-full border rounded px-3 py-2"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Số điện thoại</label>
                    <input th:field="*{phoneNumber}" class="w-full border rounded px-3 py-2"/>
                </div>
                <button type="submit" class="bg-primary text-white px-6 py-2 rounded-lg">Lưu</button>
            </form>
            <a th:href="@{/admin/dashboard}" class="inline-block mt-4 text-sm text-primary hover:underline">← Về tổng quan</a>
        </div>
    </div>
</div>
</body>
</html>
