<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/admin/head :: head('Nhật ký hoạt động')}"></th:block>
</head>
<body class="bg-gray-100">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/admin/sidebar :: sidebar('audit')}"></div>
    <div class="ml-64 flex-1 p-6">
        <h1 class="text-xl font-bold mb-4">Nhật ký hoạt động Admin</h1>
        <div class="bg-white rounded-lg shadow overflow-hidden text-sm">
            <table class="min-w-full">
                <thead class="bg-gray-50">
                <tr>
                    <th class="px-4 py-3 text-left">Thời gian</th>
                    <th class="px-4 py-3 text-left">User</th>
                    <th class="px-4 py-3 text-left">Hành động</th>
                    <th class="px-4 py-3 text-left">Đối tượng</th>
                    <th class="px-4 py-3 text-left">Chi tiết</th>
                </tr>
                </thead>
                <tbody class="divide-y">
                <tr th:each="log : ${logs.content}" class="hover:bg-gray-50">
                    <td class="px-4 py-2 whitespace-nowrap" th:text="${#temporals.format(log.createdAt, 'dd/MM HH:mm:ss')}"></td>
                    <td class="px-4 py-2" th:text="${log.username}"></td>
                    <td class="px-4 py-2 font-mono text-xs" th:text="${log.action}"></td>
                    <td class="px-4 py-2" th:text="${log.entityType} + ' #' + ${log.entityId}"></td>
                    <td class="px-4 py-2 text-gray-600" th:text="${log.detail}"></td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="mt-4 flex gap-2 text-sm" th:if="${logs.totalPages > 1}">
            <a th:if="${logs.hasPrevious()}" th:href="@{/admin/audit(page=${logs.number - 1})}" class="px-3 py-1 border rounded bg-white">Trước</a>
            <span th:text="'Trang ' + (${logs.number} + 1) + ' / ' + ${logs.totalPages}"></span>
            <a th:if="${logs.hasNext()}" th:href="@{/admin/audit(page=${logs.number + 1})}" class="px-3 py-1 border rounded bg-white">Sau</a>
        </div>
    </div>
</div>
</body>
</html>
