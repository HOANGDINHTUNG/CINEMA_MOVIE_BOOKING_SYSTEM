<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/admin/head :: head('Báo cáo doanh thu')}"></th:block>
</head>
<body class="bg-gray-100">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/admin/sidebar :: sidebar('reports')}"></div>
    <div class="ml-64 flex-1">
        <div class="bg-white shadow-sm p-4 sticky top-0 z-10">
            <h1 class="text-xl font-semibold text-gray-800">Báo cáo doanh thu</h1>
        </div>
        <div class="p-6">
            <form method="get" class="bg-white rounded-lg shadow p-4 mb-6 flex flex-wrap gap-4 items-end">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Năm</label>
                    <input type="number" name="year" th:value="${year}" class="border rounded px-3 py-2 w-28"/>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Từ ngày</label>
                    <input type="date" name="from" th:value="${from}" class="border rounded px-3 py-2"/>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Đến ngày</label>
                    <input type="date" name="to" th:value="${to}" class="border rounded px-3 py-2"/>
                </div>
                <button type="submit" class="bg-primary text-white px-4 py-2 rounded-lg">Xem báo cáo</button>
            </form>

            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <p class="text-gray-600">Tổng doanh thu (khoảng đã chọn)</p>
                <p class="text-3xl font-bold text-primary mt-2"
                   th:text="${#numbers.formatDecimal(report.totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' đ'"></p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="font-semibold mb-4">Doanh thu theo tháng (<span th:text="${year}"></span>)</h2>
                    <table class="min-w-full text-sm">
                        <thead><tr class="border-b"><th class="text-left py-2">Tháng</th><th class="text-right py-2">Doanh thu</th></tr></thead>
                        <tbody>
                        <tr th:each="entry : ${report.revenueByMonth}" class="border-b border-gray-100">
                            <td class="py-2" th:text="'Tháng ' + ${entry.key}"></td>
                            <td class="py-2 text-right" th:text="${#numbers.formatDecimal(entry.value, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="font-semibold mb-4">Top 5 phim</h2>
                    <table class="min-w-full text-sm">
                        <thead><tr class="border-b"><th class="text-left py-2">Phim</th><th class="text-right py-2">Doanh thu</th></tr></thead>
                        <tbody>
                        <tr th:each="m : ${report.topMovies}" class="border-b border-gray-100">
                            <td class="py-2" th:text="${m.title}"></td>
                            <td class="py-2 text-right" th:text="${#numbers.formatDecimal(m.revenue, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(report.topMovies)}">
                            <td colspan="2" class="py-4 text-center text-gray-500">Chưa có dữ liệu</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
