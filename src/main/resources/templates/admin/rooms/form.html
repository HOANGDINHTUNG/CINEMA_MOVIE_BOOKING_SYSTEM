<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/admin/head :: head('Tạo phòng')}"></th:block>
</head>
<body class="bg-gray-100">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/admin/sidebar :: sidebar('rooms')}"></div>
    <div class="ml-64 flex-1 p-6 max-w-md">
        <h1 class="text-xl font-bold mb-4">Tạo phòng mới</h1>
        <div th:replace="~{fragments/admin/alerts :: alerts}"></div>
        <form th:action="@{/admin/rooms}" th:object="${roomRequest}" method="post"
              class="bg-white rounded-lg shadow p-6 space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Tên phòng</label>
                <input th:field="*{roomName}" class="w-full border rounded px-3 py-2" required/>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Số hàng (A, B, C...)</label>
                <input th:field="*{rows}" type="number" min="1" class="w-full border rounded px-3 py-2" required/>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Ghế mỗi hàng</label>
                <input th:field="*{seatsPerRow}" type="number" min="1" class="w-full border rounded px-3 py-2" required/>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Số hàng VIP (từ cuối)</label>
                <input th:field="*{vipRowsFromEnd}" type="number" min="0" class="w-full border rounded px-3 py-2"/>
            </div>
            <button type="submit" class="bg-primary text-white px-5 py-2 rounded-lg">Tạo phòng + ghế</button>
        </form>
    </div>
</div>
</body>
</html>
