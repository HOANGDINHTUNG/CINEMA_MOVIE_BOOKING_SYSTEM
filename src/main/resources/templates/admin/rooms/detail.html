<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/admin/head :: head('Chi tiết phòng')}"></th:block>
</head>
<body class="bg-gray-100">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/admin/sidebar :: sidebar('rooms')}"></div>
    <div class="ml-64 flex-1 p-6">
        <a th:href="@{/admin/rooms}" class="text-primary text-sm">← Phòng</a>
        <h1 class="text-xl font-bold mt-2" th:text="${room.roomName}"></h1>
        <p class="text-gray-500 text-sm mb-4" th:text="${room.totalSeats} + ' ghế'"></p>
        <div class="bg-white rounded-lg shadow p-4 flex flex-wrap gap-2 text-xs font-mono max-h-96 overflow-y-auto">
            <span th:each="s : ${seats}"
                  th:classappend="${s.seatType.name() == 'VIP'} ? 'bg-amber-100 text-amber-900' : 'bg-gray-100'"
                  class="px-2 py-1 rounded" th:text="${s.label}"></span>
        </div>
    </div>
</div>
</body>
</html>
