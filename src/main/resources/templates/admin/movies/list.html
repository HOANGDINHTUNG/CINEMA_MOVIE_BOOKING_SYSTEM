<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/admin/head :: head('Quản lý phim rạp')}"></th:block>
</head>
<body class="bg-gray-100">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/admin/sidebar :: sidebar('movies')}"></div>
    <div class="ml-64 flex-1">
        <div class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-10">
            <h1 class="text-xl font-semibold text-gray-800">Phim đang / đã đăng tại rạp</h1>
            <a th:href="@{/admin/movies/import}"
               class="bg-primary hover:bg-secondary text-white px-4 py-2 rounded-lg text-sm font-medium">
                <i class="fas fa-plus mr-1"></i> Đăng phim từ TMDB
            </a>
        </div>
        <div class="p-6">
            <div th:replace="~{fragments/admin/alerts :: alerts}"></div>
            <form method="get" class="bg-white rounded-lg shadow p-4 mb-4 flex flex-wrap gap-3 items-end">
                <input type="hidden" name="lang" th:value="${lang}"/>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Trạng thái</label>
                    <select name="status" class="border rounded px-3 py-2 text-sm">
                        <option value="">Tất cả</option>
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                th:selected="${statusFilter == s}"></option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Tìm (tên / TMDB ID)</label>
                    <input type="text" name="q" th:value="${keyword}" class="border rounded px-3 py-2 text-sm w-48"/>
                </div>
                <button type="submit" class="bg-primary text-white px-4 py-2 rounded-lg text-sm">Lọc</button>
            </form>
            <form id="bulkSyncForm" th:action="@{/admin/movies/bulk-sync-tmdb}" method="post" class="bg-white rounded-lg shadow overflow-hidden">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="lang" th:value="${lang}"/>
                <div class="px-4 py-2 border-b bg-gray-50 flex justify-between items-center">
                    <span class="text-sm text-gray-600">Chọn phim rồi sync runtime TMDB</span>
                    <button type="submit" class="text-sm bg-blue-600 text-white px-3 py-1 rounded"
                            onclick="return document.querySelectorAll('#bulkSyncForm input[type=checkbox]:checked').length > 0">
                        Sync đã chọn
                    </button>
                </div>
                <table class="min-w-full text-sm divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                    <tr>
                        <th class="px-3 py-3 w-8"></th>
                        <th class="px-4 py-3 text-left text-gray-600">ID</th>
                        <th class="px-4 py-3 text-left text-gray-600">TMDB</th>
                        <th class="px-4 py-3 text-left text-gray-600">Tên</th>
                        <th class="px-4 py-3 text-left text-gray-600">TG</th>
                        <th class="px-4 py-3 text-left text-gray-600">TT</th>
                        <th class="px-4 py-3 text-right text-gray-600">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                    <tr th:each="m : ${movies.content}" class="hover:bg-gray-50">
                        <td class="px-3 py-3"><input type="checkbox" name="movieIds" th:value="${m.movieId}"/></td>
                        <td class="px-4 py-3" th:text="${m.movieId}"></td>
                        <td class="px-4 py-3" th:text="${m.tmdbId}"></td>
                        <td class="px-4 py-3 font-medium" th:text="${m.displayTitle}"></td>
                        <td class="px-4 py-3" th:text="${m.duration} + 'p'"></td>
                        <td class="px-4 py-3">
                            <span th:classappend="${m.status.name() == 'ACTIVE'} ? 'bg-green-100 text-green-800' : 'bg-gray-200'"
                                  class="px-2 py-1 rounded text-xs" th:text="${m.status}"></span>
                        </td>
                        <td class="px-4 py-3 text-right text-xs whitespace-nowrap">
                            <a th:href="@{/admin/movies/{id}/showtimes(id=${m.movieId})}" class="text-blue-600 hover:underline mr-2">Suất</a>
                            <a th:href="@{/admin/movies/{id}/edit(id=${m.movieId}, lang=${lang})}" class="text-primary hover:underline mr-2">Sửa</a>
                            <form th:if="${m.status.name() == 'ACTIVE'}" th:action="@{/admin/movies/{id}/delete(id=${m.movieId})}" method="post" class="inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="text-red-600 hover:underline" onclick="return confirm('Ẩn phim?')">Ẩn</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </form>
            <div class="mt-4 flex gap-2 text-sm" th:if="${movies.totalPages > 1}">
                <a th:if="${movies.hasPrevious()}"
                   th:href="@{/admin/movies(page=${movies.number - 1}, status=${statusFilter}, q=${keyword}, lang=${lang})}"
                   class="px-3 py-1 border rounded bg-white">Trước</a>
                <span th:text="'Trang ' + (${movies.number} + 1) + ' / ' + ${movies.totalPages}"></span>
                <a th:if="${movies.hasNext()}"
                   th:href="@{/admin/movies(page=${movies.number + 1}, status=${statusFilter}, q=${keyword}, lang=${lang})}"
                   class="px-3 py-1 border rounded bg-white">Sau</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
