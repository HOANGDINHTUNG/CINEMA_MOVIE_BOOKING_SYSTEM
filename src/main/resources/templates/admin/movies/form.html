<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/admin/head :: head('Cài đặt phim rạp')}"></th:block>
</head>
<body class="bg-gray-100">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/admin/sidebar :: sidebar('movies')}"></div>
    <div class="ml-64 flex-1">
        <div class="bg-white shadow-sm p-4">
            <h1 class="text-xl font-semibold">Cài đặt rạp — <span th:text="${displayTitle}"></span></h1>
            <p class="text-sm text-gray-500 mt-1">TMDB #<span th:text="${tmdbId}"></span> · Trạng thái: <span th:text="${status}"></span></p>
        </div>
        <div class="p-6 max-w-2xl space-y-4">
            <form th:action="@{/admin/movies/{id}(id=${movieId})}"
                  th:object="${movieRequest}" method="post" class="bg-white rounded-lg shadow p-6 space-y-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="lang" th:value="${lang}"/>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Thời lượng chiếu (phút)</label>
                    <input th:field="*{duration}" type="number" min="1" required class="w-full border rounded px-3 py-2"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nhãn độ tuổi (T13, K, …)</label>
                    <input th:field="*{ageLabel}" class="w-full border rounded px-3 py-2"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Giá vé cơ bản mặc định (VNĐ)</label>
                    <input th:field="*{defaultBasePrice}" type="number" step="1000" class="w-full border rounded px-3 py-2"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Ghi chú nội bộ</label>
                    <textarea th:field="*{adminNote}" rows="3" class="w-full border rounded px-3 py-2"></textarea>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="bg-primary text-white px-6 py-2 rounded-lg">Lưu</button>
                    <a th:href="@{/admin/movies}" class="px-6 py-2 border rounded-lg text-gray-700">Quay lại</a>
                </div>
            </form>
            <form th:action="@{/admin/movies/{id}/regenerate-schedule(id=${movieId})}" method="post" class="bg-amber-50 border border-amber-200 rounded-lg p-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <p class="text-sm text-amber-900 mb-2">Tạo lịch chiếu mẫu (10 ngày × 5 suất) nếu phim chưa có suất.</p>
                <button type="submit" class="px-4 py-2 bg-amber-600 text-white rounded-lg text-sm"
                        onclick="return confirm('Tiếp tục?')">Tạo lịch mẫu</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
