<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/admin/head :: head('Tạo suất hàng loạt')}"></th:block>
</head>
<body class="bg-gray-100">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/admin/sidebar :: sidebar('showtimes')}"></div>
    <div class="ml-64 flex-1 p-6 max-w-xl">
        <h1 class="text-xl font-bold text-gray-800 mb-4">Tạo suất chiếu hàng loạt</h1>
        <div th:replace="~{fragments/admin/alerts :: alerts}"></div>
        <form th:action="@{/admin/showtimes/bulk}" th:object="${bulkRequest}" method="post"
              class="bg-white rounded-lg shadow p-6 space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Phim</label>
                <select th:field="*{movieId}" class="w-full border rounded px-3 py-2" id="movieSelect">
                    <option value="">-- Chọn phim --</option>
                    <option th:each="m : ${movies}" th:value="${m.movieId}"
                            th:attr="data-tmdb=${m.tmdbId}"
                            th:text="${m.displayTitle}"
                            th:selected="${bulkRequest.movieId != null and bulkRequest.movieId == m.movieId}"></option>
                </select>
                <input type="hidden" th:field="*{tmdbId}" id="tmdbIdField"/>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Phòng</label>
                <select th:field="*{roomId}" class="w-full border rounded px-3 py-2">
                    <option th:each="r : ${rooms}" th:value="${r.roomId}" th:text="${r.roomName}"></option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Từ ngày</label>
                    <input th:field="*{startDate}" type="date" required class="w-full border rounded px-3 py-2"/>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Đến ngày</label>
                    <input th:field="*{endDate}" type="date" required class="w-full border rounded px-3 py-2"/>
                </div>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Khung giờ (cách nhau dấu phẩy)</label>
                <input th:field="*{timeSlots}" type="text" class="w-full border rounded px-3 py-2"
                       placeholder="10:00,14:00,18:00,21:30"/>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Giá cơ bản</label>
                <input th:field="*{basePrice}" type="number" step="1000" required class="w-full border rounded px-3 py-2"/>
            </div>
            <button type="submit" class="bg-primary text-white px-5 py-2 rounded-lg">Tạo suất</button>
        </form>
    </div>
</div>
<script>
    document.getElementById('movieSelect')?.addEventListener('change', function () {
        var opt = this.options[this.selectedIndex];
        var tmdb = opt.getAttribute('data-tmdb');
        if (tmdb) document.getElementById('tmdbIdField').value = tmdb;
    });
</script>
</body>
</html>
