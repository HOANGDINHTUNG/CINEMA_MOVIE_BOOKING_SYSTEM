<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/admin/head :: head('Tạo suất chiếu')}"></th:block>
</head>
<body class="bg-gray-100">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/admin/sidebar :: sidebar('showtimes')}"></div>
    <div class="ml-64 flex-1">
        <div class="bg-white shadow-sm p-4">
            <h1 class="text-xl font-semibold text-gray-800">Tạo suất chiếu mới</h1>
        </div>
        <div class="p-6 max-w-xl">
            <p th:if="${errorMessage}" class="mb-4 p-3 rounded bg-red-100 text-red-800" th:text="${errorMessage}"></p>
            <form th:action="@{/admin/showtimes}" th:object="${showtimeRequest}" method="post"
                  class="bg-white rounded-lg shadow p-6 space-y-4"
                  data-showtime-schedule-check="true" data-default-duration="120">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phim</label>
                    <select id="movieSelect" class="w-full border rounded px-3 py-2 mb-2">
                        <option value="">-- Chọn phim --</option>
                        <option th:each="m : ${movies}" th:value="${m.movieId}"
                                th:attr="data-tmdb=${m.tmdbId},data-price=${m.defaultBasePrice},data-duration=${m.duration}"
                                th:text="${m.displayTitle}"></option>
                    </select>
                    <input th:field="*{tmdbId}" type="number" id="tmdbIdField" required min="1"
                           class="w-full border rounded px-3 py-2" placeholder="TMDB ID"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phòng</label>
                    <select th:field="*{roomId}" required class="w-full border rounded px-3 py-2">
                        <option th:each="r : ${rooms}" th:value="${r.roomId}" th:text="${r.roomName}"></option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Giờ bắt đầu</label>
                    <input th:field="*{startTime}" type="datetime-local" required
                           id="showtimeStartTime" class="w-full border rounded px-3 py-2"/>
                    <p class="text-xs text-gray-400 mt-1">Chỉ chọn thời điểm sau bây giờ.</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Giá cơ bản (VNĐ)</label>
                    <input th:field="*{basePrice}" type="number" step="1000" required class="w-full border rounded px-3 py-2"/>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="bg-primary text-white px-6 py-2 rounded-lg">Tạo suất</button>
                    <a th:href="@{/admin/showtimes}" class="px-6 py-2 border rounded-lg text-gray-700">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script th:src="@{/js/admin-showtime-scheduling.js}"></script>
<script>
    document.getElementById('movieSelect')?.addEventListener('change', function () {
        var opt = this.options[this.selectedIndex];
        var tmdb = opt.getAttribute('data-tmdb');
        var price = opt.getAttribute('data-price');
        if (tmdb) document.getElementById('tmdbIdField').value = tmdb;
        if (price) document.querySelector('[name=basePrice]').value = price;
    });
</script>
</body>
</html>
