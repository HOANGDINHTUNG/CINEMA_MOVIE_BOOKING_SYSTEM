<!DOCTYPE html>

<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>

    <th:block th:replace="~{fragments/admin/head :: head('Lịch tuần suất chiếu')}"></th:block>

    <link rel="stylesheet" th:href="@{/css/admin/admin-showtimes-calendar.css}"/>

</head>

<body class="bg-gray-100 admin-showtimes-calendar-page"

      th:attr="data-week=${weekStart},data-room-id=${roomFilter}">

<div class="flex min-h-screen">

    <div th:replace="~{fragments/admin/sidebar :: sidebar('showtimes')}"></div>

    <div class="ml-64 flex-1">

        <div class="bg-white shadow-sm p-4 flex flex-wrap justify-between items-center gap-3 sticky top-0 z-10">

            <div>

                <h1 class="text-xl font-semibold text-gray-800">Lịch suất chiếu theo tuần</h1>

                <p class="text-sm text-gray-500 mt-1" id="calendar-week-label"

                   th:text="${#temporals.format(weekStart, 'dd/MM/yyyy')} + ' – ' + ${#temporals.format(weekEnd, 'dd/MM/yyyy')}">

                </p>

            </div>

            <div class="flex flex-wrap gap-2 items-center">

                <div class="inline-flex rounded-lg border border-gray-200 overflow-hidden text-sm">

                    <span class="px-3 py-2 bg-primary text-white font-medium">Lịch tuần</span>

                    <a th:href="@{/admin/showtimes(roomId=${roomFilter})}"

                       class="px-3 py-2 bg-white hover:bg-gray-50 text-gray-700">Danh sách</a>

                </div>

                <a th:href="@{/admin/showtimes/bulk}" class="border border-gray-300 px-4 py-2 rounded-lg text-sm hover:bg-gray-50">Tạo hàng loạt</a>

                <a th:href="@{/admin/showtimes/new}" class="bg-primary text-white px-4 py-2 rounded-lg text-sm">

                    <i class="fas fa-plus mr-1"></i> Tạo suất

                </a>

            </div>

        </div>



        <div class="p-6">

            <div th:replace="~{fragments/admin/alerts :: alerts}"></div>



            <div class="bg-white rounded-lg shadow p-4 mb-4 flex flex-wrap gap-3 items-end justify-between text-sm">

                <form method="get" class="flex flex-wrap gap-3 items-end">

                    <input type="hidden" name="week" th:value="${weekStart}"/>

                    <div>

                        <label class="block text-xs text-gray-500 mb-1">Phòng</label>

                        <select name="roomId" class="border rounded px-2 py-2 min-w-[140px]">

                            <option value="">Tất cả phòng</option>

                            <option th:each="r : ${rooms}" th:value="${r.roomId}" th:text="${r.roomName}"

                                    th:selected="${roomFilter != null and roomFilter == r.roomId}"></option>

                        </select>

                    </div>

                    <button type="submit" class="bg-gray-800 text-white px-4 py-2 rounded-lg">Áp dụng</button>

                </form>

                <div class="flex gap-2 items-center">

                    <a th:href="@{/admin/showtimes/calendar(week=${previousWeek}, roomId=${roomFilter})}"

                       class="px-3 py-2 border rounded-lg bg-white hover:bg-gray-50" title="Tuần trước">

                        <i class="fas fa-chevron-left"></i>

                    </a>

                    <a th:href="@{/admin/showtimes/calendar(roomId=${roomFilter})}"

                       class="px-3 py-2 border rounded-lg bg-white hover:bg-gray-50 text-xs">Tuần này</a>

                    <a th:href="@{/admin/showtimes/calendar(week=${nextWeek}, roomId=${roomFilter})}"

                       class="px-3 py-2 border rounded-lg bg-white hover:bg-gray-50" title="Tuần sau">

                        <i class="fas fa-chevron-right"></i>

                    </a>

                </div>

            </div>



            <div class="admin-cal-legend mb-3 flex flex-wrap gap-2">

                <span><i class="bg-green-500"></i> ACTIVE</span>

                <span><i class="bg-orange-500"></i> SOLD_OUT</span>

                <span><i class="bg-gray-400"></i> CANCELLED</span>

                <span><i class="bg-purple-500"></i> HIDDEN</span>

            </div>



            <div id="calendar-loading" class="text-sm text-gray-500 mb-3">

                <i class="fas fa-spinner fa-spin"></i> Đang tải lịch tuần…

            </div>

            <div id="calendar-container" class="bg-white rounded-lg shadow admin-calendar-wrap hidden"></div>

            <p id="calendar-empty" class="text-gray-500 bg-white rounded-lg shadow p-8 text-center hidden">

                Chưa có phòng chiếu. <a th:href="@{/admin/rooms}" class="text-primary hover:underline">Tạo phòng</a> trước khi lên lịch.

            </p>

        </div>

    </div>

</div>

<script th:src="@{/js/admin-showtimes.js}"></script>

</body>

</html>
