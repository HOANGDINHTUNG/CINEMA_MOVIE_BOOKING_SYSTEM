<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/admin/head :: head('Thêm combo')}"></th:block>
</head>
<body class="bg-gray-100">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/admin/sidebar :: sidebar('combos')}"></div>
    <div class="ml-64 flex-1 p-6 max-w-md">
        <h1 class="text-xl font-bold mb-4">Thêm combo</h1>
        <form th:action="@{/admin/combos}" th:object="${comboRequest}" method="post"
              class="bg-white rounded-lg shadow p-6 space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div>
                <label class="block text-sm mb-1">Tên</label>
                <input th:field="*{name}" class="w-full border rounded px-3 py-2" required/>
            </div>
            <div>
                <label class="block text-sm mb-1">Mô tả</label>
                <textarea th:field="*{description}" rows="3" class="w-full border rounded px-3 py-2"></textarea>
            </div>
            <div>
                <label class="block text-sm mb-1">Giá</label>
                <input th:field="*{price}" type="number" step="1000" class="w-full border rounded px-3 py-2" required/>
            </div>
            <div>
                <label class="block text-sm mb-1">Trạng thái</label>
                <select th:field="*{status}" class="w-full border rounded px-3 py-2">
                    <option value="ACTIVE">ACTIVE</option>
                    <option value="INACTIVE">INACTIVE</option>
                </select>
            </div>
            <button type="submit" class="bg-primary text-white px-5 py-2 rounded-lg">Lưu</button>
        </form>
    </div>
</div>
</body>
</html>
