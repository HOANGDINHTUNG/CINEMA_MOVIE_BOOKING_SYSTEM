<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng ký - NCC</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/auth/auth.css}"/>
</head>
<body class="auth-page">
<div class="auth-wrap">
    <div class="auth-logo">
        <img th:src="@{/assets/img/image.png}" alt="NCC"/>
        <h2>Smart Cinema Booking</h2>
    </div>
    <div class="auth-card">
        <h3>Đăng ký tài khoản</h3>
        <p th:if="${errorMessage}" class="alert-msg error" th:text="${errorMessage}"></p>
        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label>Tên đăng nhập</label>
            <input th:field="*{username}" required/>
            <label>Email</label>
            <input th:field="*{email}" type="email" required/>
            <label>Mật khẩu</label>
            <input th:field="*{password}" type="password" required/>
            <label>Họ tên</label>
            <input th:field="*{fullName}" required/>
            <label>Số điện thoại</label>
            <input th:field="*{phoneNumber}"/>
            <button class="btn-submit" type="submit">Đăng ký</button>
        </form>
        <div class="auth-footer">
            <a th:href="@{/login}">Đã có tài khoản? Đăng nhập</a>
        </div>
    </div>
</div>
</body>
</html>
