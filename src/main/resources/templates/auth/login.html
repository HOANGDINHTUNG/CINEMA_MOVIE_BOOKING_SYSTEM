<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng nhập - NCC</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/auth/auth.css}"/>
</head>
<body class="auth-page">
<div class="auth-wrap">
    <div class="auth-logo">
        <img th:src="@{/assets/img/image.png}" alt="NCC"/>
        <h2>Smart Cinema Booking</h2>
    </div>
    <div class="auth-card">
        <h3>Đăng nhập</h3>
        <p th:if="${param.logout}" class="alert-msg success">Đã đăng xuất thành công.</p>
        <p th:if="${param.error}" class="alert-msg error">Sai tên đăng nhập hoặc mật khẩu.</p>
        <p th:if="${successMessage}" class="alert-msg success" th:text="${successMessage}"></p>
        <p th:if="${errorMessage}" class="alert-msg error" th:text="${errorMessage}"></p>
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label>Tên đăng nhập</label>
            <input type="text" name="username" required autofocus/>
            <label>Mật khẩu</label>
            <input type="password" name="password" required/>
            <button type="submit" class="btn-submit">Đăng nhập</button>
        </form>
        <div class="auth-footer">
            <a th:href="@{/register}">Chưa có tài khoản? Đăng ký</a>
        </div>
    </div>
</div>
</body>
</html>
