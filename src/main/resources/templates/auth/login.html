<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/auth/head :: head(#{auth.login.page_title})}"></th:block>
</head>
<body class="auth-page">
<div class="auth-shell">
    <div th:replace="~{fragments/auth/hero :: hero}"></div>

    <main class="auth-main">
        <div th:replace="~{fragments/auth/alerts :: loginAlerts}"></div>

        <div class="auth-main__top">
            <a th:href="@{/customer/home}" class="auth-back">
                <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
                <span th:text="#{auth.back_home}">Về trang chủ</span>
            </a>
        </div>

        <div class="auth-card">
            <header class="auth-card__head">
                <h2 th:text="#{auth.login.title}">Đăng nhập</h2>
                <p th:text="#{auth.login.subtitle}">Chào mừng trở lại! Đăng nhập để tiếp tục đặt vé.</p>
            </header>

            <form class="auth-form" th:action="@{/login}" method="post" id="loginForm">
                <input type="hidden" name="redirect" th:value="${param.redirect}"/>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="auth-field">
                    <label class="auth-field__label" for="username" th:text="#{auth.field.username}">Tên đăng nhập</label>
                    <div class="auth-field__control">
                        <i class="fa-solid fa-user auth-field__icon" aria-hidden="true"></i>
                        <input id="username" type="text" name="username" required autofocus
                               autocomplete="username"
                               th:placeholder="#{auth.placeholder.username}"/>
                    </div>
                </div>

                <div class="auth-field">
                    <label class="auth-field__label" for="password" th:text="#{auth.field.password}">Mật khẩu</label>
                    <div class="auth-field__control">
                        <i class="fa-solid fa-lock auth-field__icon" aria-hidden="true"></i>
                        <input id="password" type="password" name="password" required
                               autocomplete="current-password"
                               th:placeholder="#{auth.placeholder.password}"/>
                        <button type="button" class="auth-field__toggle" data-password-toggle
                                th:attr="aria-label=#{auth.toggle_password}">
                            <i class="fa-solid fa-eye" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-btn auth-btn--primary" data-auth-submit>
                    <span th:text="#{auth.login.submit}">Đăng nhập</span>
                </button>
            </form>

            <footer class="auth-card__foot">
                <p>
                    <span th:text="#{auth.login.no_account}">Chưa có tài khoản?</span>
                    <a th:href="@{/register}" th:text="#{auth.login.register_link}">Đăng ký ngay</a>
                </p>
            </footer>
        </div>
    </main>
</div>
<script th:src="@{/js/auth.js}" defer></script>
</body>
</html>
