<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/admin/head :: head('Kết quả tra cứu')}"></th:block>
</head>
<body class="bg-gray-100">
<div class="flex min-h-screen">
    <div th:replace="~{fragments/staff/sidebar :: sidebar('lookup')}"></div>
    <div class="ml-64 flex-1">
        <div class="bg-white shadow-sm p-4 sticky top-0 z-10 flex justify-between items-center">
            <h1 class="text-xl font-semibold text-gray-800">Đơn #<span th:text="${booking.bookingId}"></span></h1>
            <a th:href="@{/staff/lookup}" class="text-primary text-sm hover:underline">Tra cứu khác</a>
        </div>
        <div class="p-6 max-w-2xl">
            <div class="bg-white rounded-lg shadow p-6 space-y-2 text-gray-700">
                <p><span class="font-medium text-gray-500 w-28 inline-block">Khách hàng</span> <span th:text="${booking.customerName}"></span></p>
                <p><span class="font-medium text-gray-500 w-28 inline-block">Phim</span> <span th:text="${booking.movieTitle}"></span></p>
                <p><span class="font-medium text-gray-500 w-28 inline-block">Suất chiếu</span>
                    <span th:text="${#temporals.format(booking.showtimeStart, 'dd/MM/yyyy HH:mm')}"></span></p>
                <p><span class="font-medium text-gray-500 w-28 inline-block">Ghế</span>
                    <span th:text="${#strings.listJoin(booking.seatLabels, ', ')}"></span></p>
                <p><span class="font-medium text-gray-500 w-28 inline-block">Tổng tiền</span>
                    <span th:text="${#numbers.formatDecimal(booking.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span></p>
                <p><span class="font-medium text-gray-500 w-28 inline-block">Trạng thái</span>
                    <span class="font-semibold" th:text="${booking.status}"></span></p>
            </div>
            <div class="flex flex-wrap gap-3 mt-6">
                <form th:if="${booking.status.name() == 'PENDING'}"
                      th:action="@{/staff/bookings/{id}/confirm(id=${booking.bookingId})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="bg-primary text-white px-5 py-2 rounded-lg">Xác nhận thanh toán quầy</button>
                </form>
                <a th:href="@{/staff/bookings/{id}/print(id=${booking.bookingId})}"
                   class="px-5 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">In vé</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
