spring.application.name=PTIT_CNTT1_IT210_PROJECTFINAL_CinemaMovieBookingSystem

server.port=8081

# Dev: khong luu session len disk (tranh ClassCastException sau khi restart / doi Spring Security)
server.servlet.session.persistent=false

# ========== MySQL (sua mat khau cho dung may ban) ==========
spring.datasource.url=jdbc:mysql://localhost:3306/smart_cinema_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=09042006ha$$Tung
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA tao/cap nhat bang tu entity, sau do nap du lieu tu db/seed.sql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Tu dong chay file SQL mau khi khoi dong (INSERT IGNORE — chay lai khong trung)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:db/seed.sql
spring.sql.init.continue-on-error=true

# Thymeleaf
spring.thymeleaf.cache=false

# i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# Booking
cinema.brand-name=Smart Cinema
cinema.seat-lock-minutes=15
cinema.cancel-hours-before=24
cinema.cleaning-buffer-minutes=15
cinema.vip-price-multiplier=1.5
cinema.max-seats-per-booking=8
# Tu dong dang 3 phim TMDB + lich mau neu chua co suat sap toi (can tmdb.api-key)
cinema.demo-seed-on-startup=true
cinema.home-coming-soon-max=100
cinema.demo-seed-now-showing-target=100
cinema.demo-seed-coming-soon-target=100

# ========== TMDB ==========
# Key mac dinh: application-local.properties (tu dong import, khong commit Git)
# Hoac bien moi truong: TMDB_API_KEY, TMDB_BEARER_TOKEN
spring.config.import=optional:classpath:application-local.properties

tmdb.base-url=https://api.themoviedb.org/3
# Spring Boot: TMDB_API_KEY / TMDB_BEARER_TOKEN hoac tmdb.* trong application-local.properties
# (VITE_* chi danh cho React — van doc duoc neu ban dat bien moi truong VITE_TMDB_V3_KEY)
tmdb.api-key=${TMDB_API_KEY:${VITE_TMDB_V3_KEY:}}
tmdb.bearer-token=${TMDB_BEARER_TOKEN:${VITE_TMDB_V4_TOKEN:${VITE_API_KEY:}}}
tmdb.timeout-ms=30000
tmdb.image-base=https://image.tmdb.org/t/p/
